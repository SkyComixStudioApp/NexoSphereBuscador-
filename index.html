<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoxeSphare</title> <link rel="icon" type="image/png" href="https://i.ibb.co/kVFZJmn3/IMG-20260212-154521.png">
    <style>
        /* Eliminar recuadro azul de selección */
        *, *:focus, *:active { 
            outline: none !important; 
            box-shadow: none !important; 
            -webkit-tap-highlight-color: transparent !important; 
        }
        
        /* Importar fuente personalizada local */
        @font-face {
            font-family: 'CustomFont';
            src: url('Fuente/Champagne y limusinas Bold.ttf') format('truetype');
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'CustomFont', 'Segoe UI', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent !important;
        }
        
        body {
            background-color: #000;
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .logo-bar {
            background-color: rgba(0, 0, 0, 0.95);
            width: 100%;
            padding: 10px 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            height: 30px;
            display: block;
        }
        
        /* BOTÓN DE LUPA */
        .search-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }
        
        .search-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .search-toggle-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }
        
        /* Panel de búsqueda flotante */
        .search-filters-panel {
            position: fixed;
            top: 55px;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.98);
            z-index: 99;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.5s ease, opacity 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        
        .search-filters-panel.visible {
            max-height: 600px;
            opacity: 1;
        }
        
        .search-filters-content {
            padding: 15px;
        }
        
        /* Recuadro para buscador */
        .search-box-container {
            background-color: rgba(5, 5, 5, 0.95);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #222;
        }
        
        .search-container {
            position: relative;
            width: 100%;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        
        .search-box {
            width: 100%;
            padding: 10px 18px 10px 40px;
            border-radius: 22px;
            border: 1px solid #333;
            font-size: 15px;
            background-color: #111;
            color: white;
            transition: all 0.3s ease;
            outline: none !important;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #444;
            box-shadow: 0 0 0 2px rgba(100, 100, 100, 0.2);
        }
        
        .search-icon {
            position: absolute;
            left: 13px; top: 50%;
            transform: translateY(-50%);
            width: 18px; 
            object-fit: contain;
            pointer-events: none;
        }

        .pin-btn {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #777;
            font-size: 18px;
            transition: all 0.3s ease;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            padding: 0;
            outline: none !important;
        }
        
        .pin-btn:hover {
            color: #ff4d4d;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-50%) scale(1.1);
        }
        
        .pin-btn.pinned {
            color: #ff4d4d;
        }

        .pin-icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* BOTONES DE TIPO (TODO, IMAGENES, VIDEOS) */
        .type-filters {
            display: flex;
            justify-content: center;
            gap: 5px; 
            margin-bottom: 15px;
            width: 100%;
        }

        .type-btn {
            background-color: #222;
            color: #aaa;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            text-align: center;
        }

        .type-btn.active {
            background-color: #ff4d4d;
            color: white;
            border-color: #ff4d4d;
            font-weight: bold;
        }

        .type-btn:hover:not(.active) {
            background-color: #333;
        }

        /* FILTRO ANTI IA */
        .ai-filter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
            padding: 0 5px;
        }

        .ai-filter-label {
            font-size: 13px;
            color: #ccc;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 22px;
            border: 1px solid #444;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: #aaa;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(255, 77, 77, 0.2);
            border-color: #ff4d4d;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #ff4d4d;
        }

        .search-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .option {
            background-color: #222;
            color: #ccc;
            padding: 6px 14px;
            border-radius: 18px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #333;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }
        
        .option:hover {
            background-color: #333;
            transform: translateY(-1px);
        }
        
        /* CUADRÍCULA - COLUMNAS FIJAS */
        .results-wrapper {
            max-width: 1800px;
            margin: 0 auto;
            padding: 15px 15px 20px 15px;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 12px;
        }

        .masonry-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        
        .image-card {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #0a0a0a;
            position: relative;
            cursor: pointer;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards;
            display: flex;
            flex-direction: column;
        }

        /* ETIQUETA DE TIPO (VIDEO/IMAGEN) */
        .type-badge {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            z-index: 5;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        .type-badge.video-badge {
            background-color: rgba(255, 77, 77, 0.8);
            border-color: #ff4d4d;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .skeleton {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes skeletonPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.8; }
        }
        
        .image-result {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 1;
            transition: opacity 0.3s ease;
            background-color: transparent;
        }
        
        /* MODAL */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.98);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 95vw;
            margin: 0 auto;
            padding: 60px 0 30px 0;
        }

        .modal-image-container {
            position: relative;
            max-width: 100%;
            max-height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-image, .modal-video {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        .close-arrow-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1002;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        .close-arrow-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .arrow-icon {
            width: 20px;
            height: 20px;
            fill: white;
            transform: rotate(180deg);
        }

        /* ETIQUETAS Y RECUADRO */
        .tags-section {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 5px;
        }

        .tags-header {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
            text-transform: none;
            letter-spacing: 0.8px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .tags-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tags-count {
            background-color: #333;
            color: #ccc;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
        }

        .tags-box {
            background-color: #0f0f0f;
            border: 1px solid #222;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tags-list-container {
            padding: 12px;
        }

        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 65px;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
        }

        .tags-list.expanded {
            max-height: 1500px;
        }

        .show-more-tags-btn {
            background-color: #161616;
            color: #4a90e2;
            border: none;
            border-top: 1px solid #222;
            padding: 12px;
            width: 100%;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            transition: background-color 0.3s ease;
            text-align: center;
        }

        .show-more-tags-btn:hover {
            background-color: #222;
        }

        .translation-status {
            width: 100%;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
            border: 1px solid transparent;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            cursor: default;
        }
        
        .translating-status {
            background-color: rgba(74, 144, 226, 0.1);
            border-color: #4a90e2;
            color: #4a90e2;
            display: block;
        }
        
        .translated-status {
            background-color: rgba(0, 255, 0, 0.1);
            border-color: #00ff00;
            color: #00ff00;
            display: block;
        }

        .modal-tag {
            background-color: #222;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #333;
            display: inline-block;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        .modal-tag:hover {
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        /* SECCIÓN IMÁGENES RELACIONADAS */
        .related-images-section {
            width: 100%;
            max-width: 1000px;
            margin: 30px auto 20px;
            padding: 0 5px;
        }

        .related-header {
            font-size: 14px;
            color: #aaa;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .related-grid {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }

        .related-masonry-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .related-loading-indicator {
            width: 100%;
            text-align: center;
            padding: 15px;
            color: #4a90e2;
            font-size: 13px;
            display: none;
            margin-top: 10px;
        }
        
        .related-loading-indicator.active {
            display: block;
        }

        /* CARGA Y ESTADOS */
        #scrollLoading {
            text-align: center;
            padding: 20px;
            width: 100%;
            color: #4a90e2;
            font-size: 12px;
            display: none;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .load-more-indicator {
            text-align: center;
            padding: 20px;
            color: #4a90e2;
            font-size: 14px;
            display: none;
        }
        
        .load-more-indicator.active {
            display: block;
        }
        
        .translating-indicator {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #4a90e2;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .no-more-results {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 14px;
            display: none;
        }
        
        .no-more-results.visible {
            display: block;
        }

        /* MEDIA QUERIES SOLAMENTE PARA ELEMENTOS DE LA UI QUE NO SON LA GALERÍA */
        @media (min-width: 1024px) {
            .logo { height: 42px; }
            .logo-bar { padding: 12px 25px; }
            .modal-tag { font-size: 13px; padding: 7px 16px; max-width: 260px; }
            .tags-section, .related-images-section { max-width: 1000px; }
        }

        @media (min-width: 1440px) {
            .search-filters-panel.visible { max-height: 600px; }
            .search-box { font-size: 16px; padding: 12px 18px 12px 45px; }
            .search-icon { width: 18px; left: 15px; }
            .pin-btn { right: 15px; }
            .option { padding: 8px 18px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="logo-bar">
        <img src="https://i.ibb.co/qYhKY4cy/IMG-20260326-171237.png" alt="Logo" class="logo">
        <button class="search-toggle-btn" id="searchToggleBtn" title="Mostrar buscador">
            <img src="https://i.ibb.co/n84F5wwC/lupa.png" alt="Buscar" class="search-toggle-icon">
        </button>
    </div>
    
    <div class="search-filters-panel" id="searchFiltersPanel">
        <div class="search-filters-content">
            <div class="search-box-container">
                <div class="search-container">
                    <img src="https://i.ibb.co/n84F5wwC/lupa.png" alt="Buscar" class="search-icon">
                    <input type="text" class="search-box" id="searchInput" placeholder="Buscar (en inglés)...">
                    <button class="pin-btn" id="pinBtn" title="Fijar búsqueda">
                        <svg class="pin-icon" viewBox="0 0 24 24">
                            <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/>
                        </svg>
                    </button>
                </div>

                <div class="type-filters">
                    <button class="type-btn active" data-type="all">Todo</button>
                    <button class="type-btn" data-type="image">Imágenes</button>
                    <button class="type-btn" data-type="video">Vídeos</button>
                </div>

                <div class="ai-filter-container">
                    <span class="ai-filter-label">OCULTAR GENERADO POR IA</span>
                    <label class="switch">
                        <input type="checkbox" id="aiFilterToggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="search-options" id="searchOptions">
                </div>
            </div>
        </div>
    </div>
    
    <div class="results-wrapper" id="resultsContainer"></div>
    <div id="scrollLoading">Buscando imágenes...</div>
    <div class="load-more-indicator" id="loadMoreIndicator">Cargando más imágenes...</div>
    <div class="no-more-results" id="noMoreResults">No hay más imágenes para mostrar</div>

    <div class="image-modal" id="imageModal">
        <div class="modal-content">
            <div class="modal-image-container" id="modalMediaContainer">
                <img class="modal-image" id="modalImage" src="" alt="">
            </div>
            
            <div class="tags-section" id="tagsSection">
                <div class="tags-header">
                    <span>
                        🏷️ Etiquetas
                        <span class="tags-count" id="tagsCount">0</span>
                    </span>
                </div>
                
                <div class="translation-status" id="translatingStatus">
                    <span class="translating-indicator"></span>
                    Traduciendo etiquetas...
                </div>
                <div class="translation-status" id="translatedStatus">
                    ✓ Etiquetas traducidas
                </div>
                
                <div class="tags-box">
                    <div class="tags-list-container">
                        <div class="tags-list" id="tagsList"></div>
                    </div>
                    <button class="show-more-tags-btn" id="showMoreTagsBtn">Ver más etiquetas</button>
                </div>
            </div>

            <div class="related-images-section" id="relatedImagesSection">
                <div class="related-header">
                    <span>🔗 Imágenes Relacionadas</span>
                </div>
                <div class="related-grid" id="relatedImagesGrid"></div>
                <div class="related-loading-indicator" id="relatedLoadingIndicator">Cargando más relacionados...</div>
            </div>
        </div>
        
        <div class="close-arrow-btn" id="closeArrowBtn">
            <svg class="arrow-icon" viewBox="0 0 24 24">
                <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
            </svg>
        </div>
    </div>

    <script>
        // API RULE34
        const R34_API_KEY = '98292e068da149bb7d1a02f400727e06a5bc26e1d4e044b0b371e8eec454484606d1d25cd3c6192802f1a33b8b7e4cd1979930172f638e101e8131fe033d22b0';
        const R34_USER_ID = '5935306';

        const TRANSLATE_API = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q=";
        
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const scrollLoading = document.getElementById('scrollLoading');
        const loadMoreIndicator = document.getElementById('loadMoreIndicator');
        const imageModal = document.getElementById('imageModal');
        const modalMediaContainer = document.getElementById('modalMediaContainer');
        const tagsList = document.getElementById('tagsList');
        const tagsCount = document.getElementById('tagsCount');
        const closeArrowBtn = document.getElementById('closeArrowBtn');
        const pinBtn = document.getElementById('pinBtn');
        const searchOptions = document.getElementById('searchOptions');
        const searchToggleBtn = document.getElementById('searchToggleBtn');
        const searchFiltersPanel = document.getElementById('searchFiltersPanel');
        const translatingStatus = document.getElementById('translatingStatus');
        const translatedStatus = document.getElementById('translatedStatus');
        const noMoreResults = document.getElementById('noMoreResults');
        const typeButtons = document.querySelectorAll('.type-btn');
        const showMoreTagsBtn = document.getElementById('showMoreTagsBtn');
        const relatedImagesGrid = document.getElementById('relatedImagesGrid');
        const relatedLoadingIndicator = document.getElementById('relatedLoadingIndicator');
        const aiFilterToggle = document.getElementById('aiFilterToggle');
        
        let currentPage = 0;
        let currentTags = '';
        let isFetching = false;
        let endOfAllResults = false;
        let currentImageData = null;
        let allPosts = [];
        let savedTags = [];
        let isLoadingMore = false;
        let isSearchVisible = false;
        let currentImageTags = [];
        let isTranslating = false;
        let activeSearchId = null;
        let isAutoLoadEnabled = true;
        let currentTypeFilter = 'all'; 

        // Variable para controlar la profundidad del historial del modal
        let modalHistoryDepth = 0;

        // Variables para relacionados
        let relatedCurrentPage = 0;
        let isFetchingRelated = false;
        let endOfRelatedResults = false;
        let currentRelatedSearchTags = '';

        // --- FUNCIONES MASONRY JS ---
        function setupMasonryColumns() {
            resultsContainer.innerHTML = '';
            const colCount = 2; // Columnas fijas
            for (let i = 0; i < colCount; i++) {
                const col = document.createElement('div');
                col.className = 'masonry-column';
                resultsContainer.appendChild(col);
            }
        }

        function getShortestColumn() {
            const cols = resultsContainer.querySelectorAll('.masonry-column');
            if (cols.length === 0) return null;
            let shortest = cols[0];
            let minHeight = shortest.offsetHeight;
            for(let i = 1; i < cols.length; i++) {
                if (cols[i].offsetHeight < minHeight) {
                    minHeight = cols[i].offsetHeight;
                    shortest = cols[i];
                }
            }
            return shortest;
        }

        // --- FUNCIONES MASONRY PARA IMÁGENES RELACIONADAS ---
        function setupRelatedMasonryColumns() {
            relatedImagesGrid.innerHTML = '';
            const colCount = 2; // Columnas fijas
            for (let i = 0; i < colCount; i++) {
                const col = document.createElement('div');
                col.className = 'related-masonry-column';
                relatedImagesGrid.appendChild(col);
            }
        }

        function getShortestRelatedColumn() {
            const cols = relatedImagesGrid.querySelectorAll('.related-masonry-column');
            if (cols.length === 0) return null;
            let shortest = cols[0];
            let minHeight = shortest.offsetHeight;
            for(let i = 1; i < cols.length; i++) {
                if (cols[i].offsetHeight < minHeight) {
                    minHeight = cols[i].offsetHeight;
                    shortest = cols[i];
                }
            }
            return shortest;
        }
        // ------------------------------

        function toggleSearchVisibility() {
            isSearchVisible = !isSearchVisible;
            if (isSearchVisible) {
                searchFiltersPanel.classList.add('visible');
                setTimeout(() => searchInput.focus(), 300);
            } else {
                searchFiltersPanel.classList.remove('visible');
            }
        }

        function closeSearchOnClickOutside(event) {
            if (isSearchVisible && 
                !searchFiltersPanel.contains(event.target) && 
                !searchToggleBtn.contains(event.target)) {
                toggleSearchVisibility();
            }
        }

        function loadSavedTags() {
            const saved = localStorage.getItem('noxesphare_saved_tags');
            if (saved) {
                savedTags = JSON.parse(saved);
                renderSavedTags();
            }
        }

        function saveTagsToStorage() {
            localStorage.setItem('noxesphare_saved_tags', JSON.stringify(savedTags));
        }

        function renderSavedTags() {
            searchOptions.innerHTML = '';
            savedTags.forEach(t => {
                const tagElement = document.createElement('div');
                tagElement.className = 'option';
                tagElement.textContent = t.display;
                tagElement.dataset.tag = t.tag;
                tagElement.addEventListener('click', () => {
                    searchInput.value = t.display;
                    startSearch(t.tag);
                    if (isSearchVisible) toggleSearchVisibility();
                });
                searchOptions.appendChild(tagElement);
            });
        }

        function addSavedTag(tag, display) {
            if (!savedTags.some(t => t.tag === tag)) {
                savedTags.push({ tag, display });
                saveTagsToStorage();
                const tagElement = document.createElement('div');
                tagElement.className = 'option';
                tagElement.textContent = display;
                tagElement.dataset.tag = tag;
                tagElement.addEventListener('click', () => {
                    searchInput.value = display;
                    startSearch(tag);
                    if (isSearchVisible) toggleSearchVisibility();
                });
                searchOptions.insertBefore(tagElement, searchOptions.firstChild);
                updatePinButtonState(tag);
            }
        }

        function removeSavedTag(tag) {
            savedTags = savedTags.filter(t => t.tag !== tag);
            saveTagsToStorage();
            const existing = searchOptions.querySelector(`.option[data-tag="${tag}"]`);
            if (existing) existing.remove();
            updatePinButtonState('');
        }

        function updatePinButtonState(tag) {
            const isPinned = savedTags.some(t => t.tag === tag);
            pinBtn.classList.toggle('pinned', isPinned);
        }

        function formatSearchText(text) {
            return text.trim().toLowerCase().replace(/,/g, ' ');
        }

        async function translateTagsToSpanish(tagsArray) {
            const translatedTags = [];
            for (let tag of tagsArray) {
                if (!tag.trim()) continue;
                const tagText = tag.replace(/_/g, ' ');
                try {
                    const response = await fetch(`${TRANSLATE_API}${encodeURIComponent(tagText)}`);
                    const data = await response.json();
                    if (data && data[0] && data[0][0] && data[0][0][0]) {
                        const translated = data[0][0][0];
                        translatedTags.push({
                            original: tag,
                            translated: translated,
                            display: translated.charAt(0).toUpperCase() + translated.slice(1).toLowerCase()
                        });
                    } else {
                        translatedTags.push({
                            original: tag,
                            translated: tagText,
                            display: tagText.charAt(0).toUpperCase() + tagText.slice(1).toLowerCase()
                        });
                    }
                } catch (error) {
                    translatedTags.push({
                        original: tag,
                        translated: tagText,
                        display: tagText.charAt(0).toUpperCase() + tagText.slice(1).toLowerCase()
                    });
                }
                await new Promise(resolve => setTimeout(resolve, 50));
            }
            return translatedTags;
        }

        async function fetchBooruPosts(baseUrl, apiKey, userId, tags, page, customLimit = 10) {
            let finalTags = tags ? tags.trim() : '';
            
            // Filtros de Tipo
            if (currentTypeFilter === 'image') {
                finalTags += ' -video -animated';
            } else if (currentTypeFilter === 'video') {
                finalTags = finalTags ? `${finalTags} video` : 'video';
            }

            // Filtro Anti IA
            if (aiFilterToggle && aiFilterToggle.checked) {
                finalTags = finalTags ? `${finalTags} -ai_generated` : '-ai_generated';
            }

            const tagsParam = finalTags ? `&tags=${encodeURIComponent(finalTags)}` : '';
            const url = `${baseUrl}?page=dapi&s=post&q=index&json=1${tagsParam}&api_key=${apiKey}&user_id=${userId}&limit=${customLimit}&pid=${page}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) return [];
                const data = await response.json();
                return data.post || (Array.isArray(data) ? data : []);
            } catch (err) {
                console.error("Error en fetch:", baseUrl, err);
                return [];
            }
        }

        async function fetchRule34Posts() {
            return await fetchBooruPosts('https://api.rule34.xxx/index.php', R34_API_KEY, R34_USER_ID, currentTags, currentPage, 10);
        }

        // FUNCIÓN PARA BUSCAR IMÁGENES RELACIONADAS EN EL MODAL
        async function loadRelatedImages(tagsString) {
            relatedImagesGrid.innerHTML = '';
            relatedCurrentPage = 0;
            isFetchingRelated = false;
            endOfRelatedResults = false;
            currentRelatedSearchTags = '';

            if (!tagsString) {
                relatedImagesGrid.innerHTML = '<div style="color:#aaa; text-align:center; flex:1; padding: 15px;">No hay datos para relacionar.</div>';
                return;
            }

            const arr = tagsString.split(' ').filter(t => t.trim() !== '' && t !== 'video' && t !== 'animated' && t !== 'sound');
            
            if(arr.length === 0) {
                relatedImagesGrid.innerHTML = '<div style="color:#aaa; text-align:center; flex:1; padding: 15px;">No hay etiquetas útiles para relacionar.</div>';
                return;
            }

            const shuffled = arr.sort(() => 0.5 - Math.random());
            currentRelatedSearchTags = shuffled.slice(0, Math.min(2, shuffled.length)).join(' ');

            setupRelatedMasonryColumns();
            await fetchAndAppendRelatedImages();
        }

        function createRelatedImageCard(post, index) {
            return new Promise((resolve) => {
                if (!post) { resolve(); return; }
                
                const fileUrl = fixImageUrl(post.file_url);
                if (!fileUrl) { resolve(); return; }

                const ext = fileUrl.split('.').pop().split('?')[0].toLowerCase();
                const isVideo = ext === 'mp4' || ext === 'webm';
                const isGif = ext === 'gif';

                const card = document.createElement('div');
                card.className = 'image-card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.style.opacity = '0';
                card.style.animation = 'fadeInUp 0.5s forwards';
                
                if (post.width && post.height) {
                    card.style.aspectRatio = `${post.width} / ${post.height}`;
                } else {
                    card.style.aspectRatio = '4 / 5'; 
                }

                if (isVideo || isGif) {
                    const badge = document.createElement('div');
                    badge.className = 'type-badge video-badge';
                    badge.textContent = 'VÍDEO';
                    card.appendChild(badge);
                } else {
                    const badge = document.createElement('div');
                    badge.className = 'type-badge';
                    badge.textContent = 'IMAGEN';
                    card.appendChild(badge);
                }

                const skeleton = document.createElement('div');
                skeleton.className = 'skeleton';
                card.appendChild(skeleton);

                let gridUrl = fixImageUrl(post.preview_url || post.sample_url || post.file_url);
                let mediaEl = document.createElement('img');
                mediaEl.className = 'image-result';
                mediaEl.loading = 'lazy';
                mediaEl.src = gridUrl;
                
                mediaEl.onload = () => skeleton.remove();
                mediaEl.onerror = () => { 
                    const fallback = fixImageUrl(post.file_url);
                    if (fallback && fallback !== gridUrl && !isVideo) {
                        mediaEl.src = fallback;
                        return;
                    }
                    card.style.display = 'none'; 
                };
                
                card.addEventListener('click', () => {
                    const imageData = { imgUrl: fileUrl, tags: post.tags || '' };
                    openImageModal(imageData); 
                });
                
                card.appendChild(mediaEl);
                
                const shortestCol = getShortestRelatedColumn();
                if (shortestCol) {
                    shortestCol.appendChild(card);
                } else {
                    relatedImagesGrid.appendChild(card);
                }
                
                resolve();
            });
        }

        async function fetchAndAppendRelatedImages() {
            if (isFetchingRelated || endOfRelatedResults || !currentRelatedSearchTags) return;
            
            isFetchingRelated = true;
            relatedLoadingIndicator.classList.add('active');

            const relatedPosts = await fetchBooruPosts('https://api.rule34.xxx/index.php', R34_API_KEY, R34_USER_ID, currentRelatedSearchTags, relatedCurrentPage, 12);
            
            relatedLoadingIndicator.classList.remove('active');

            if (relatedPosts.length === 0) {
                endOfRelatedResults = true;
                if (relatedCurrentPage === 0) {
                    relatedImagesGrid.innerHTML = '<div style="color:#aaa; text-align:center; flex:1; padding: 15px;">No se encontraron relacionados.</div>';
                }
            } else {
                for (let i = 0; i < relatedPosts.length; i++) {
                    await createRelatedImageCard(relatedPosts[i], i);
                    await new Promise(resolve => setTimeout(resolve, 20)); 
                }
                relatedCurrentPage++;
            }
            isFetchingRelated = false;
        }

        function formatTag(tag) {
            return tag.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function toggleTagsExpanded() {
            tagsList.classList.toggle('expanded');
            if (tagsList.classList.contains('expanded')) {
                showMoreTagsBtn.textContent = 'Ocultar etiquetas';
            } else {
                showMoreTagsBtn.textContent = 'Ver más etiquetas';
            }
        }

        function checkTagsOverflow(count) {
            if (count > 8) {
                showMoreTagsBtn.style.display = 'block';
            } else {
                showMoreTagsBtn.style.display = 'none';
            }
        }

        function displayTags(tagsString) {
            tagsList.innerHTML = '';
            tagsList.classList.remove('expanded');
            showMoreTagsBtn.textContent = 'Ver más etiquetas';

            if (!tagsString) {
                tagsList.innerHTML = '<div class="modal-tag">No hay etiquetas disponibles</div>';
                tagsCount.textContent = '0';
                showMoreTagsBtn.style.display = 'none';
                return;
            }

            const tagsArray = tagsString.split(' ');
            tagsCount.textContent = tagsArray.length;
            currentImageTags = tagsArray;

            tagsArray.forEach(tag => {
                if (tag.trim()) {
                    const tagElement = document.createElement('div');
                    tagElement.className = 'modal-tag';
                    tagElement.textContent = formatTag(tag);
                    tagElement.dataset.tag = tag;
                    tagElement.addEventListener('click', () => {
                        closeImageModal();
                        searchInput.value = formatTag(tag);
                        startSearch(tag);
                        if (isSearchVisible) toggleSearchVisibility();
                    });
                    tagsList.appendChild(tagElement);
                }
            });

            checkTagsOverflow(tagsArray.length);
        }

        function displayTranslatedTags(translatedTags) {
            tagsList.innerHTML = '';
            translatedTags.forEach(tagData => {
                const tagElement = document.createElement('div');
                tagElement.className = 'modal-tag';
                tagElement.textContent = tagData.display;
                tagElement.dataset.tag = tagData.original;
                tagElement.addEventListener('click', () => {
                    closeImageModal();
                    searchInput.value = formatTag(tagData.original);
                    startSearch(tagData.original);
                    if (isSearchVisible) toggleSearchVisibility();
                });
                tagsList.appendChild(tagElement);
            });
        }

        async function startAutoTranslation() {
            if (currentImageTags.length === 0 || isTranslating) return;
            isTranslating = true;
            translatingStatus.classList.add('translating-status');
            translatingStatus.style.display = 'block';
            translatedStatus.style.display = 'none';
            try {
                const translatedTags = await translateTagsToSpanish(currentImageTags);
                translatingStatus.classList.remove('translating-status');
                translatingStatus.style.display = 'none';
                translatedStatus.classList.add('translated-status');
                translatedStatus.style.display = 'block';
                displayTranslatedTags(translatedTags);
                setTimeout(() => {
                    translatedStatus.classList.remove('translated-status');
                    translatedStatus.style.display = 'none';
                }, 3000);
            } catch (error) {
                translatingStatus.classList.remove('translating-status');
                translatingStatus.style.display = 'none';
            } finally {
                isTranslating = false;
            }
        }

        function openImageModal(imageData, fromHistory = false) {
            currentImageData = imageData;
            modalMediaContainer.innerHTML = '';
            
            // Lógica de guardado en el historial
            if (!fromHistory) {
                modalHistoryDepth++;
                history.pushState({ modalOpen: true, imageData: imageData, depth: modalHistoryDepth }, "");
            } else {
                modalHistoryDepth = history.state?.depth || 0;
            }

            const ext = imageData.imgUrl.split('.').pop().split('?')[0].toLowerCase();
            const isVideo = ext === 'mp4' || ext === 'webm';

            let mediaElement;
            if (isVideo) {
                mediaElement = document.createElement('video');
                mediaElement.className = 'modal-video';
                mediaElement.controls = true;
                mediaElement.autoplay = true;
                mediaElement.loop = true;
                mediaElement.playsInline = true; 
                mediaElement.src = imageData.imgUrl; 
                
                // Forzar reproducción por si el navegador la bloquea
                setTimeout(() => {
                    const playPromise = mediaElement.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            // Si se bloquea por tener sonido, se silencia e inicia
                            mediaElement.muted = true;
                            mediaElement.play();
                        });
                    }
                }, 50);

            } else {
                mediaElement = document.createElement('img');
                mediaElement.className = 'modal-image';
                mediaElement.src = imageData.imgUrl;
            }
            
            modalMediaContainer.appendChild(mediaElement);
            imageModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            translatingStatus.style.display = 'none';
            translatedStatus.style.display = 'none';
            
            if (imageData.tags) {
                displayTags(imageData.tags);
                loadRelatedImages(imageData.tags); 
                setTimeout(() => startAutoTranslation(), 500);
            } else {
                displayTags('');
                loadRelatedImages('');
            }
            
            imageModal.scrollTop = 0; 
        }

        function closeImageModal(fromHistory = false) {
            if (imageModal.style.display !== 'block') return; 

            imageModal.style.display = 'none';
            document.body.style.overflow = 'auto';
            currentImageData = null;
            currentImageTags = [];
            isTranslating = false;
            
            const video = modalMediaContainer.querySelector('video');
            if (video) {
                video.pause();
                video.src = "";
            }
            
            translatingStatus.style.display = 'none';
            translatedStatus.style.display = 'none';
            relatedImagesGrid.innerHTML = ''; 

            // Manejo de retroceso masivo al cerrar totalmente
            if (!fromHistory && modalHistoryDepth > 0) {
                history.go(-modalHistoryDepth);
                modalHistoryDepth = 0;
            } else if (fromHistory) {
                modalHistoryDepth = 0;
            }
        }

        function isNearBottom() {
            const scrollPosition = window.innerHeight + window.scrollY;
            const pageHeight = document.documentElement.scrollHeight;
            return pageHeight - scrollPosition < 500;
        }

        async function loadMoreImages() {
            if (isFetching || endOfAllResults || isLoadingMore || !isAutoLoadEnabled) return;
            isLoadingMore = true;
            loadMoreIndicator.classList.add('active');
            noMoreResults.classList.remove('visible');
            currentPage++;

            const r34Items = await fetchRule34Posts();
            const combinedItems = [...r34Items];
            
            if (combinedItems.length > 0) {
                allPosts = [...allPosts, ...combinedItems];
                await processImagesSequentially(combinedItems);
                setTimeout(() => {
                    if (isNearBottom() && !isFetching && !endOfAllResults) loadMoreImages();
                }, 1000);
            } else {
                endOfAllResults = true;
                noMoreResults.classList.add('visible');
            }
            
            loadMoreIndicator.classList.remove('active');
            isLoadingMore = false;
        }

        function fixImageUrl(url) {
            if (!url) return null;
            if (!url.startsWith('http')) return 'https:' + url;
            return url;
        }

        function createImageCard(post, index) {
            return new Promise((resolve) => {
                if (!post) { resolve(); return; }
                
                const fileUrl = fixImageUrl(post.file_url);
                if (!fileUrl) { resolve(); return; }

                const ext = fileUrl.split('.').pop().split('?')[0].toLowerCase();
                const isVideo = ext === 'mp4' || ext === 'webm';
                const isGif = ext === 'gif';

                const card = document.createElement('div');
                card.className = 'image-card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                if (post.width && post.height) {
                    card.style.aspectRatio = `${post.width} / ${post.height}`;
                } else {
                    card.style.aspectRatio = '4 / 5'; 
                }
                
                const badge = document.createElement('div');
                badge.className = 'type-badge';
                if (isVideo || isGif) {
                    badge.classList.add('video-badge');
                    badge.textContent = 'VÍDEO';
                    if (currentTypeFilter === 'all' || currentTypeFilter === 'video') {
                        card.appendChild(badge);
                    }
                } else {
                    badge.textContent = 'IMAGEN';
                    if (currentTypeFilter === 'all') {
                        card.appendChild(badge);
                    }
                }

                const skeleton = document.createElement('div');
                skeleton.className = 'skeleton';
                card.appendChild(skeleton);

                let gridUrl = fixImageUrl(post.preview_url || post.sample_url || post.file_url);
                let mediaEl = document.createElement('img');
                mediaEl.className = 'image-result';
                mediaEl.loading = 'lazy';
                mediaEl.src = gridUrl;
                
                mediaEl.onload = () => skeleton.remove();
                mediaEl.onerror = () => {
                     const fallback = fixImageUrl(post.file_url);
                     if (fallback && fallback !== gridUrl && !isVideo) {
                         mediaEl.src = fallback;
                         return;
                     }
                    card.style.display = 'none';
                };
                
                card.addEventListener('click', () => {
                    const imageData = {
                        imgUrl: fileUrl, 
                        tags: post.tags || ''
                    };
                    openImageModal(imageData);
                });
                
                card.appendChild(mediaEl);
                
                const shortestCol = getShortestColumn();
                if (shortestCol) {
                    shortestCol.appendChild(card);
                } else {
                    resultsContainer.appendChild(card);
                }
                resolve();
            });
        }

        async function processImagesSequentially(posts) {
            for (let i = 0; i < posts.length; i++) {
                if (activeSearchId === null) break; 
                await createImageCard(posts[i], i);
                await new Promise(resolve => setTimeout(resolve, 20)); 
            }
        }

        async function startSearch(tags, isNewSearch = true) {
            if (isFetching) return;
            isFetching = true;
            scrollLoading.style.display = 'block';
            loadMoreIndicator.classList.remove('active');
            noMoreResults.classList.remove('visible');
            
            const searchId = Date.now().toString();
            activeSearchId = searchId;
            
            if (isNewSearch) {
                currentPage = 0;
                endOfAllResults = false;
                setupMasonryColumns(); 
                allPosts = [];
                isAutoLoadEnabled = true;
                currentTags = formatSearchText(tags);
                updatePinButtonState(currentTags);
            }

            const r34Items = await fetchRule34Posts();
            const combinedItems = [...r34Items];
            
            if (combinedItems.length > 0 && activeSearchId === searchId) {
                allPosts = [...allPosts, ...combinedItems];
                await processImagesSequentially(combinedItems);
                
                setTimeout(() => {
                    if (!endOfAllResults && activeSearchId === searchId) {
                        if (isNearBottom()) loadMoreImages();
                    }
                }, 500);
            } else if (isNewSearch && activeSearchId === searchId) {
                resultsContainer.innerHTML = '<p style="width: 100%; text-align: center; color: #aaa; padding: 40px 0;">No se encontró nada reciente.</p>';
            }

            scrollLoading.style.display = 'none';
            isFetching = false;
        }

        // LÓGICA DE NAVEGACIÓN Y CIERRE
        closeArrowBtn.addEventListener('click', () => {
            // Ir hacia atrás retrocede a la imagen anterior si es que hay historial
            history.back(); 
        });
        
        imageModal.addEventListener('click', (e) => { 
            // Clic fuera del contenido cierra todo el modal
            if (e.target === imageModal) closeImageModal(); 
        });
        
        document.getElementById('tagsSection').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('relatedImagesSection').addEventListener('click', (e) => e.stopPropagation());
        modalMediaContainer.addEventListener('click', (e) => e.stopPropagation());
        
        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape' && imageModal.style.display === 'block') closeImageModal(); 
        });

        // POPSTATE - SE EJECUTA AL DARLE ATRÁS EN EL NAVEGADOR O AL HACER history.back()
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.modalOpen && e.state.imageData) {
                // Hay historial interno del modal (una imagen anterior)
                openImageModal(e.state.imageData, true);
            } else {
                // Volvimos al inicio, a la galería principal
                closeImageModal(true);
            }
        });

        showMoreTagsBtn.addEventListener('click', toggleTagsExpanded);

        pinBtn.addEventListener('click', async () => {
            const searchText = searchInput.value.trim();
            if (searchText) {
                const formattedTag = formatSearchText(searchText);
                const isAlreadySaved = savedTags.some(t => t.tag === formattedTag);
                if (isAlreadySaved) removeSavedTag(formattedTag);
                else addSavedTag(formattedTag, formatTag(formattedTag));
            }
        });

        searchToggleBtn.addEventListener('click', toggleSearchVisibility);
        document.addEventListener('click', closeSearchOnClickOutside);

        typeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                typeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTypeFilter = btn.dataset.type;
                startSearch(searchInput.value.trim() || currentTags);
            });
        });

        aiFilterToggle.addEventListener('change', () => {
            localStorage.setItem('noxesphare_ai_filter', aiFilterToggle.checked);
            startSearch(searchInput.value.trim() || currentTags);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startSearch(searchInput.value.trim());
                if (isSearchVisible) toggleSearchVisibility();
            }
        });

        let scrollTimeout;
        window.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (!isFetching && !endOfAllResults && isAutoLoadEnabled && isNearBottom()) loadMoreImages();
            }, 200);
        });

        let modalScrollTimeout;
        imageModal.addEventListener('scroll', () => {
            clearTimeout(modalScrollTimeout);
            modalScrollTimeout = setTimeout(() => {
                if (imageModal.style.display === 'block') {
                    const { scrollTop, scrollHeight, clientHeight } = imageModal;
                    if (scrollHeight - scrollTop <= clientHeight + 350) {
                        fetchAndAppendRelatedImages();
                    }
                }
            }, 200);
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedTags();
            
            const savedAIFilter = localStorage.getItem('noxesphare_ai_filter');
            if (savedAIFilter === 'true') {
                aiFilterToggle.checked = true;
            }

            startSearch(''); 
        });
    </script>
